name: Bootstrap BACnet CLI implementation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.head_ref == 'agent/implement-basic-bacnet-cli'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false

      - name: Expand implementation
        run: python3 bootstrap.py

      - name: Format source
        run: gofmt -w $(find . -name '*.go' -type f)

      - name: Resolve modules
        run: go mod tidy

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Commit verified implementation
        run: |
          rm bootstrap.py .github/workflows/bootstrap.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Implement basic BACnet/IP CLI'
          git push origin HEAD:${{ github.head_ref }}
