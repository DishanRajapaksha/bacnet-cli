name: Module capture

on:
  pull_request:

permissions:
  contents: read

jobs:
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false
      - name: Capture tidy result
        shell: bash
        run: |
          set +e
          go mod tidy > tidy.log 2>&1
          echo $? > tidy.status
          exit 0
      - name: Upload module diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: bacnet-cli-module-diagnostics
          path: |
            tidy.log
            tidy.status
            go.mod
            go.sum
