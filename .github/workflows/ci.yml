name: Module capture

on:
  pull_request:

permissions:
  contents: read

jobs:
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false
      - name: Tidy modules
        run: go mod tidy
      - name: Upload tidied module files
        uses: actions/upload-artifact@v4
        with:
          name: bacnet-cli-tidied-modules
          path: |
            go.mod
            go.sum
