name: Format capture

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false
      - name: Format source
        run: gofmt -w $(find . -name '*.go' -type f)
      - name: Upload formatted source
        uses: actions/upload-artifact@v4
        with:
          name: bacnet-cli-formatted-source
          path: |
            main.go
            internal/**/*.go
