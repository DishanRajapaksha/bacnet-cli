name: Module diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false
      - name: Tidy and verify
        shell: bash
        run: |
          go mod tidy
          gofmt -w $(find . -name '*.go' -type f)
          go vet ./...
          go test -race ./...
          go build ./...
      - name: Upload tidied module files
        uses: actions/upload-artifact@v4
        with:
          name: bacnet-cli-module-files
          path: |
            go.mod
            go.sum
