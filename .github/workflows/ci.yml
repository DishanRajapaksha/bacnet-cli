name: Format diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false
      - name: Format source
        shell: bash
        run: |
          set +e
          gofmt -w $(find . -name '*.go' -type f) > format.log 2>&1
          echo $? > format.status
          exit 0
      - name: Upload formatted source and log
        uses: actions/upload-artifact@v4
        with:
          name: bacnet-cli-format-diagnostics
          path: |
            format.log
            format.status
            main.go
            internal/**/*.go
